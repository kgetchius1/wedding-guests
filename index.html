<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Getchius Wedding — Guest List</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f5f4f0; --bg3: #eeede9;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9e9e9a;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --radius: 10px; --radius-sm: 6px;
    --couple-bg: #EEF4FF; --couple-border: #B5D4F4; --couple-av-bg: #B5D4F4; --couple-av-text: #042C53;
    --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --green-bg: #EAF3DE; --green-text: #3B6D11;
    --gray-bg: #F1EFE8; --gray-text: #5F5E5A;
    --amber-bg: #FAEEDA; --amber-text: #854F0B;
    --red-text: #A32D2D; --red-bg: #FCEBEB;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efeb; --text2: #a0a09c; --text3: #6a6a66;
      --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
      --couple-bg: #0d1e35; --couple-border: #185FA5; --couple-av-bg: #0C447C; --couple-av-text: #B5D4F4;
      --blue-bg: #0c2a4a; --blue-text: #85B7EB;
      --green-bg: #172a09; --green-text: #97C459;
      --gray-bg: #2c2c2a; --gray-text: #a0a09c;
      --amber-bg: #2e1e05; --amber-text: #EF9F27;
      --red-text: #F09595; --red-bg: #2e0d0d;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .login-card { background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 2rem; width: 100%; max-width: 360px; }
  .login-card h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .login-card p { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 5px; }
  .form-group input, .form-group select { width: 100%; height: 38px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); font-size: 13px; padding: 0 10px; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: #185FA5; }
  .btn-login { width: 100%; height: 38px; background: var(--text); color: var(--bg); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 0.5rem; }
  .btn-login:hover { opacity: 0.85; }
  .login-error { font-size: 12px; color: var(--red-text); background: var(--red-bg); padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 1rem; display: none; }
  .login-error.show { display: block; }
  .app { display: none; }
  .app.visible { display: block; }
  .page { max-width: 920px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { margin-bottom: 1.75rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .header-text h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header-text p { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .user-pill { font-size: 12px; color: var(--text2); background: var(--bg2); border: 0.5px solid var(--border); border-radius: 20px; padding: 4px 10px; }
  .btn-signout { height: 30px; padding: 0 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: none; color: var(--text2); font-size: 12px; cursor: pointer; }
  .btn-signout:hover { background: var(--bg2); }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .metric { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 0.9rem 1rem; }
  .metric-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .metric-value { font-size: 24px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .metric-amber .metric-value { color: var(--amber-text); }
  .legend { display: flex; gap: 18px; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--text2); }
  .legend-swatch-couple { width: 22px; height: 14px; border-radius: 3px; border-top: 1.5px solid var(--couple-border); border-bottom: 1.5px solid var(--couple-border); background: var(--couple-bg); }
  .legend-swatch-solo { width: 22px; height: 14px; border-radius: 3px; background: var(--bg); border: 0.5px solid var(--border2); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .toolbar { display: flex; gap: 8px; padding: 0.9rem; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; align-items: center; }
  .toolbar input[type=text], .toolbar select { height: 34px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); font-size: 13px; padding: 0 10px; outline: none; }
  .toolbar input[type=text] { flex: 1; min-width: 160px; }
  .toolbar input[type=text]:focus, .toolbar select:focus { border-color: #185FA5; }
  .btn { height: 34px; padding: 0 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn:hover { background: var(--bg3); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .tabs { display: flex; border-bottom: 0.5px solid var(--border); padding: 0 0.9rem; overflow-x: auto; }
  .tab { padding: 10px 14px; font-size: 13px; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -0.5px; white-space: nowrap; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
  .tab-count { display: inline-block; background: var(--bg2); color: var(--text2); font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 5px; font-weight: 500; }
  .tab.active .tab-count { background: var(--text); color: var(--bg); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 0.5px solid var(--border); }
  td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .row-couple-top td { background: var(--couple-bg); border-top: 1.5px solid var(--couple-border); border-bottom: none; }
  .row-couple-mid td { background: var(--couple-bg); border-top: none; border-bottom: none; }
  .row-couple-bot td { background: var(--couple-bg); border-bottom: 1.5px solid var(--couple-border); border-top: none; }
  .row-couple-only td { background: var(--couple-bg); border-top: 1.5px solid var(--couple-border); border-bottom: 1.5px solid var(--couple-border); }
  .row-solo td { background: var(--bg); }
  .row-solo:hover td, .row-couple-top:hover td, .row-couple-mid:hover td, .row-couple-bot:hover td, .row-couple-only:hover td { filter: brightness(0.97); }
  .col-name { width: 36%; } .col-group { width: 11%; } .col-prop { width: 21%; } .col-type { width: 18%; } .col-actions { width: 14%; }
  .col-name-p { width: 50%; } .col-group-p { width: 14%; } .col-type-p { width: 18%; } .col-actions-p { width: 18%; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-gray { background: var(--gray-bg); color: var(--gray-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .name-cell { display: flex; align-items: center; gap: 9px; }
  .avatar { width: 27px; height: 27px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
  .icon-btn { width: 28px; height: 28px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: none; color: var(--text2); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; }
  .icon-btn:hover { background: var(--bg2); color: var(--text); }
  .icon-btn-del:hover { color: var(--red-text); }
  .couple-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 10px; padding: 1rem; }
  .couple-card { border-radius: var(--radius); padding: 0.85rem 1rem; border-top: 1.5px solid var(--couple-border); border-bottom: 1.5px solid var(--couple-border); border-left: 0.5px solid var(--couple-border); border-right: 0.5px solid var(--couple-border); background: var(--couple-bg); }
  .couple-card-solo { border-radius: var(--radius); padding: 0.85rem 1rem; border: 0.5px solid var(--border); background: var(--bg); }
  .couple-card-num { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .couple-card-name { font-size: 13px; font-weight: 500; margin-bottom: 1px; }
  .couple-card-name2 { font-size: 12px; color: var(--text2); }
  .prop-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .empty { text-align: center; padding: 3rem; color: var(--text2); font-size: 13px; }
  .loading { text-align: center; padding: 3rem; color: var(--text2); font-size: 13px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border2); padding: 1.5rem; width: 100%; max-width: 440px; margin: 1rem; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 0.4rem; }
  .modal-subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.25rem; }
  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; flex-wrap: wrap; }
  .modal-actions-left { margin-right: auto; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); font-size: 13px; padding: 10px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 200; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .sync-indicator { font-size: 11px; color: var(--text3); padding: 0 0.9rem 0.6rem; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; padding: 10px 12px; background: var(--bg2); border-radius: var(--radius-sm); }
  .checkbox-row input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--text); }
  .checkbox-row label { font-size: 13px; color: var(--text); cursor: pointer; user-select: none; }
  .name-section { padding: 12px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 0.75rem; background: var(--bg2); }
  .name-section-label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; font-weight: 500; }
  .name-section .form-group:last-child { margin-bottom: 0; }
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <h1>Getchius Wedding</h1>
    <p>Sign in to manage the guest list</p>
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn-login" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div class="app" id="app">
  <div class="page">
    <div class="header">
      <div class="header-text">
        <h1>Getchius Wedding</h1>
        <p>Guest list dashboard &mdash; September 2027</p>
      </div>
      <div class="header-right">
        <span class="user-pill" id="user-email"></span>
        <button class="btn-signout" onclick="doSignOut()">Sign out</button>
      </div>
    </div>

    <div class="metrics" id="metrics"></div>

    <div class="legend" id="legend">
      <div class="legend-item"><div class="legend-swatch-couple"></div>Couple / group</div>
      <div class="legend-item"><div class="legend-swatch-solo"></div>Solo guest</div>
    </div>

    <div class="card">
      <div class="tabs">
        <button class="tab active" data-tab="all" onclick="switchTab('all',this)">All guests <span class="tab-count" id="count-all">0</span></button>
        <button class="tab" data-tab="couples" onclick="switchTab('couples',this)">By group</button>
        <button class="tab" data-tab="onprop" onclick="switchTab('onprop',this)">On property <span class="tab-count" id="count-onprop">0</span></button>
        <button class="tab" data-tab="potential" onclick="switchTab('potential',this)">Potential guests <span class="tab-count" id="count-potential">0</span></button>
      </div>
      <div class="toolbar">
        <input type="text" id="search" placeholder="Search by name..." oninput="render()" />
        <select id="filter" onchange="render()">
          <option value="all">All</option>
          <option value="couple">Couples / groups</option>
          <option value="single">Singles</option>
          <option value="onprop">On property</option>
          <option value="offprop">Off property</option>
        </select>
        <button class="btn btn-primary" id="add-btn" onclick="openAddModal()">+ Add guest</button>
        <button class="btn" onclick="exportCSV()">&#11123; Export CSV</button>
      </div>
      <div class="sync-indicator" id="sync-indicator"></div>
      <div id="content"><div class="loading">Loading...</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">Add guest</h2>
    <div class="modal-subtitle" id="modal-subtitle" style="display:none;"></div>

    <div class="checkbox-row" id="couple-toggle-row">
      <input type="checkbox" id="f-is-couple" onchange="toggleCoupleMode()" />
      <label for="f-is-couple">Add as a couple (two names in the same group)</label>
    </div>

    <div class="name-section">
      <div class="name-section-label" id="name-label-1">Name</div>
      <div class="form-group">
        <input type="text" id="f-name" placeholder="First Last" />
      </div>
    </div>

    <div class="name-section" id="second-name-section" style="display:none;">
      <div class="name-section-label">Second name</div>
      <div class="form-group">
        <input type="text" id="f-name-2" placeholder="First Last" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Group number</label>
        <input type="number" id="f-group" min="1" placeholder="e.g. 52" />
      </div>
      <div class="form-group" id="f-prop-group">
        <label>On property?</label>
        <select id="f-prop">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn modal-actions-left" id="promote-btn" onclick="promoteToGuest()" style="display:none;">&rarr; Add to guest list</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://yfrltaylrhzvrnvlezdh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlmcmx0YXlscmh6dnJudmxlemRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU5NTcsImV4cCI6MjA5NDY0MTk1N30.UGYSfgPrIMHocxtOKWUEfgl1rAy0ilx2N1kAC-rjr64';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const AVATAR_BG=['#E6F1FB','#EAF3DE','#FAEEDA','#FBEAF0','#E1F5EE','#FAECE7','#EEEDFE'];
const AVATAR_FG=['#185FA5','#3B6D11','#854F0B','#993556','#0F6E56','#993C1D','#534AB7'];
function ci(name){ let s=0; for(let c of name) s+=c.charCodeAt(0); return s%7; }
function ini(name){ const p=name.trim().split(' '); return p.length>=2?p[0][0].toUpperCase()+p[p.length-1][0].toUpperCase():name.slice(0,2).toUpperCase(); }

let guests=[], potentials=[], currentTab='all', editingId=null, editingMode=null;

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function setSyncIndicator(msg){ document.getElementById('sync-indicator').textContent=msg; }

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const err=document.getElementById('login-error');
  err.classList.remove('show');
  const {error}=await sb.auth.signInWithPassword({email,password});
  if(error){ err.textContent=error.message; err.classList.add('show'); return; }
  showApp();
}

async function doSignOut(){
  await sb.auth.signOut();
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-password').value='';
}

async function showApp(){
  const {data:{user}}=await sb.auth.getUser();
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-email').textContent=user.email;
  await loadAll();
}

async function loadAll(){
  setSyncIndicator('Loading...');
  const [g,p]=await Promise.all([
    sb.from('guests').select('*').order('group_number').order('id'),
    sb.from('potential_guests').select('*').order('group_number').order('id')
  ]);
  if(g.error||p.error){ setSyncIndicator('Error loading data'); return; }
  guests=g.data; potentials=p.data;
  setSyncIndicator('');
  render();
}

function groupCounts(list, key){
  const c={};
  list.forEach(g=>{ c[g[key]]=(c[g[key]]||0)+1; });
  return c;
}

function renderMetrics(){
  const gc=groupCounts(guests,'group_number');
  const total=guests.length;
  const onProp=guests.filter(g=>g.on_prop).length;
  const singles=Object.values(gc).filter(v=>v===1).length;
  const coupleGroups=Object.values(gc).filter(v=>v>1).length;
  const totalGroups=Object.keys(gc).length;
  const uninvited=potentials.length;
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total guests</div><div class="metric-value">${total}</div></div>
    <div class="metric"><div class="metric-label">On property</div><div class="metric-value">${onProp}</div><div class="metric-sub">${total-onProp} off property</div></div>
    <div class="metric"><div class="metric-label">Couples / groups</div><div class="metric-value">${coupleGroups}</div><div class="metric-sub">${singles} solo</div></div>
    <div class="metric"><div class="metric-label">Total groups</div><div class="metric-value">${totalGroups}</div></div>
    <div class="metric metric-amber"><div class="metric-label">Uninvited</div><div class="metric-value">${uninvited}</div><div class="metric-sub">in potential list</div></div>
  `;
  document.getElementById('count-all').textContent=total;
  document.getElementById('count-onprop').textContent=onProp;
  document.getElementById('count-potential').textContent=uninvited;
}

function getFilteredGuests(){
  const q=document.getElementById('search').value.toLowerCase();
  const f=document.getElementById('filter').value;
  const gc=groupCounts(guests,'group_number');
  return guests.filter(g=>{
    if(q && !g.name.toLowerCase().includes(q)) return false;
    const isCouple=gc[g.group_number]>1;
    if(f==='couple' && !isCouple) return false;
    if(f==='single' && isCouple) return false;
    if(f==='onprop' && !g.on_prop) return false;
    if(f==='offprop' && g.on_prop) return false;
    if(currentTab==='onprop' && !g.on_prop) return false;
    return true;
  });
}

function getFilteredPotentials(){
  const q=document.getElementById('search').value.toLowerCase();
  return potentials.filter(g=>{
    if(q && !g.name.toLowerCase().includes(q)) return false;
    return true;
  });
}

function rowClass(isCouple,pos,size){
  if(!isCouple) return 'row-solo';
  if(size===1) return 'row-couple-only';
  if(pos===0) return 'row-couple-top';
  if(pos===size-1) return 'row-couple-bot';
  return 'row-couple-mid';
}

function renderTable(list){
  const gc=groupCounts(guests,'group_number');
  if(!list.length) return '<div class="empty">No guests match your search.</div>';
  const groupMap={};
  list.forEach(g=>{ if(!groupMap[g.group_number]) groupMap[g.group_number]=[]; groupMap[g.group_number].push(g); });
  const rows=list.map(g=>{
    const isCouple=gc[g.group_number]>1;
    const members=groupMap[g.group_number];
    const pos=members.indexOf(g);
    const rc=rowClass(isCouple,pos,members.length);
    const avBg=isCouple?'var(--couple-av-bg)':AVATAR_BG[ci(g.name)];
    const avFg=isCouple?'var(--couple-av-text)':AVATAR_FG[ci(g.name)];
    return `<tr class="${rc}">
      <td><div class="name-cell"><div class="avatar" style="background:${avBg};color:${avFg}">${ini(g.name)}</div>${g.name}</div></td>
      <td style="color:var(--text2)">#${g.group_number}</td>
      <td><span class="badge ${g.on_prop?'badge-green':'badge-gray'}">${g.on_prop?'On property':'Off property'}</span></td>
      <td><span class="badge ${isCouple?'badge-blue':'badge-gray'}">${isCouple?'Couple / group':'Solo'}</span></td>
      <td>
        <button class="icon-btn" onclick="openEditGuestModal(${g.id})" title="Edit">&#9998;</button>
        <button class="icon-btn icon-btn-del" onclick="deleteGuest(${g.id})" title="Delete">&#10005;</button>
      </td>
    </tr>`;
  });
  return `<table><thead><tr>
    <th class="col-name">Name</th><th class="col-group">Group</th>
    <th class="col-prop">Property</th><th class="col-type">Type</th><th class="col-actions"></th>
  </tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

function renderPotentialsTable(list){
  const gc=groupCounts(potentials,'group_number');
  if(!list.length) return '<div class="empty">No potential guests. Click + Add potential guest to add one.</div>';
  const groupMap={};
  list.forEach(g=>{ if(!groupMap[g.group_number]) groupMap[g.group_number]=[]; groupMap[g.group_number].push(g); });
  const rows=list.map(g=>{
    const isCouple=gc[g.group_number]>1;
    const members=groupMap[g.group_number];
    const pos=members.indexOf(g);
    const rc=rowClass(isCouple,pos,members.length);
    const avBg=isCouple?'var(--couple-av-bg)':AVATAR_BG[ci(g.name)];
    const avFg=isCouple?'var(--couple-av-text)':AVATAR_FG[ci(g.name)];
    return `<tr class="${rc}">
      <td><div class="name-cell"><div class="avatar" style="background:${avBg};color:${avFg}">${ini(g.name)}</div>${g.name}</div></td>
      <td style="color:var(--text2)">#${g.group_number}</td>
      <td><span class="badge ${isCouple?'badge-blue':'badge-gray'}">${isCouple?'Couple / group':'Solo'}</span></td>
      <td>
        <button class="icon-btn" onclick="openEditPotentialModal(${g.id})" title="Edit">&#9998;</button>
        <button class="icon-btn icon-btn-del" onclick="deletePotential(${g.id})" title="Delete">&#10005;</button>
      </td>
    </tr>`;
  });
  return `<table><thead><tr>
    <th class="col-name-p">Name</th><th class="col-group-p">Group</th>
    <th class="col-type-p">Type</th><th class="col-actions-p"></th>
  </tr></thead><tbody>${rows.join('')}</tbody></table>`;
}

function renderGroups(list){
  const gc=groupCounts(guests,'group_number');
  const groupMap={};
  list.forEach(g=>{ if(!groupMap[g.group_number]) groupMap[g.group_number]=[]; groupMap[g.group_number].push(g); });
  const sorted=Object.entries(groupMap).sort((a,b)=>+a[0]-+b[0]);
  if(!sorted.length) return '<div class="empty">No groups match your search.</div>';
  return `<div class="couple-grid">${sorted.map(([num,members])=>{
    const isCouple=gc[num]>1;
    const onProp=members.some(m=>m.on_prop);
    return `<div class="${isCouple?'couple-card':'couple-card-solo'}">
      <div class="couple-card-num"><span>Group #${num}</span><span><span class="prop-dot" style="background:${onProp?'#639922':'#888780'}"></span>${onProp?'On prop':'Off prop'}</span></div>
      ${members.map((m,i)=>`<div class="${i===0?'couple-card-name':'couple-card-name2'}">${m.name}</div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

function render(){
  const addBtn=document.getElementById('add-btn');
  const legend=document.getElementById('legend');
  if(currentTab==='potential'){
    addBtn.textContent='+ Add potential guest';
    legend.style.display='flex';
    document.getElementById('content').innerHTML=renderPotentialsTable(getFilteredPotentials());
  } else {
    addBtn.textContent='+ Add guest';
    legend.style.display='flex';
    const list=getFilteredGuests();
    document.getElementById('content').innerHTML=currentTab==='couples'?renderGroups(list):renderTable(list);
  }
  renderMetrics();
}

function switchTab(t,el){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  render();
}

function nextGroupNumber(list){
  const nums=list.map(g=>g.group_number);
  return nums.length?Math.max(...nums)+1:1;
}

function toggleCoupleMode(){
  const isCouple=document.getElementById('f-is-couple').checked;
  document.getElementById('second-name-section').style.display=isCouple?'block':'none';
  document.getElementById('name-label-1').textContent=isCouple?'First name':'Name';
}

function resetCoupleToggle(){
  document.getElementById('f-is-couple').checked=false;
  document.getElementById('second-name-section').style.display='none';
  document.getElementById('name-label-1').textContent='Name';
  document.getElementById('f-name-2').value='';
}

function openAddModal(){
  editingId=null;
  resetCoupleToggle();
  document.getElementById('couple-toggle-row').style.display='flex';
  if(currentTab==='potential'){
    editingMode='potential-new';
    document.getElementById('modal-title').textContent='Add potential guest';
    document.getElementById('f-prop-group').style.display='none';
    document.getElementById('promote-btn').style.display='none';
    document.getElementById('f-group').value=nextGroupNumber(potentials);
  } else {
    editingMode='guest-new';
    document.getElementById('modal-title').textContent='Add guest';
    document.getElementById('f-prop-group').style.display='block';
    document.getElementById('promote-btn').style.display='none';
    document.getElementById('f-group').value=nextGroupNumber(guests);
    document.getElementById('f-prop').value='no';
  }
  document.getElementById('modal-subtitle').style.display='none';
  document.getElementById('f-name').value='';
  document.getElementById('modal').classList.add('open');
}

function openEditGuestModal(id){
  const g=guests.find(x=>x.id===id);
  if(!g) return;
  editingId=id; editingMode='guest-edit';
  resetCoupleToggle();
  document.getElementById('couple-toggle-row').style.display='none';
  document.getElementById('modal-title').textContent='Edit guest';
  document.getElementById('modal-subtitle').style.display='none';
  document.getElementById('f-prop-group').style.display='block';
  document.getElementById('promote-btn').style.display='none';
  document.getElementById('f-name').value=g.name;
  document.getElementById('f-group').value=g.group_number;
  document.getElementById('f-prop').value=g.on_prop?'yes':'no';
  document.getElementById('modal').classList.add('open');
}

function openEditPotentialModal(id){
  const g=potentials.find(x=>x.id===id);
  if(!g) return;
  editingId=id; editingMode='potential-edit';
  resetCoupleToggle();
  document.getElementById('couple-toggle-row').style.display='none';
  document.getElementById('modal-title').textContent='Edit potential guest';
  const sub=document.getElementById('modal-subtitle');
  sub.innerHTML='Group number shows the next available group on the guest list. Click "Add to guest list" to move them over.';
  sub.style.display='block';
  document.getElementById('f-prop-group').style.display='none';
  document.getElementById('promote-btn').style.display='inline-flex';
  document.getElementById('f-name').value=g.name;
  document.getElementById('f-group').value=nextGroupNumber(guests);
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  editingId=null; editingMode=null;
}

async function saveEntry(){
  const name=document.getElementById('f-name').value.trim();
  const name2=document.getElementById('f-name-2').value.trim();
  const isCouple=document.getElementById('f-is-couple').checked;
  const group_number=parseInt(document.getElementById('f-group').value);
  if(!name||!group_number){ alert('Please fill in name and group number.'); return; }
  if(isCouple && !name2){ alert('Please fill in the second name or uncheck the couple option.'); return; }

  const btn=document.getElementById('modal-save-btn');
  btn.textContent='Saving...'; btn.disabled=true;
  let error=null;

  if(editingMode==='guest-new'){
    const on_prop=document.getElementById('f-prop').value==='yes';
    const records=isCouple ? [{name,group_number,on_prop},{name:name2,group_number,on_prop}] : [{name,group_number,on_prop}];
    ({error}=await sb.from('guests').insert(records));
  } else if(editingMode==='guest-edit'){
    const on_prop=document.getElementById('f-prop').value==='yes';
    ({error}=await sb.from('guests').update({name,group_number,on_prop}).eq('id',editingId));
  } else if(editingMode==='potential-new'){
    const records=isCouple ? [{name,group_number},{name:name2,group_number}] : [{name,group_number}];
    ({error}=await sb.from('potential_guests').insert(records));
  } else if(editingMode==='potential-edit'){
    ({error}=await sb.from('potential_guests').update({name,group_number}).eq('id',editingId));
  }

  btn.textContent='Save'; btn.disabled=false;
  if(error){ showToast('Error saving'); return; }
  showToast(isCouple?'Both added':'Saved');
  closeModal();
  await loadAll();
}

async function promoteToGuest(){
  if(editingMode!=='potential-edit'||!editingId) return;
  const name=document.getElementById('f-name').value.trim();
  const potentialGroup=parseInt(document.getElementById('f-group').value);
  if(!name||!potentialGroup){ alert('Please fill in name and group number.'); return; }
  const newGroupNumber=nextGroupNumber(guests);
  const btn=document.getElementById('promote-btn');
  btn.textContent='Moving...'; btn.disabled=true;
  const {error:e1}=await sb.from('guests').insert({name,group_number:newGroupNumber,on_prop:false});
  if(e1){ showToast('Error moving to guest list'); btn.textContent='\u2192 Add to guest list'; btn.disabled=false; return; }
  const {error:e2}=await sb.from('potential_guests').delete().eq('id',editingId);
  if(e2){ showToast('Added but could not remove from potential list'); }
  btn.textContent='\u2192 Add to guest list'; btn.disabled=false;
  showToast(name+' added to guest list');
  closeModal();
  await loadAll();
}

async function deleteGuest(id){
  if(!confirm('Remove this guest?')) return;
  const {error}=await sb.from('guests').delete().eq('id',id);
  if(error){ showToast('Error deleting'); return; }
  showToast('Guest removed');
  await loadAll();
}

async function deletePotential(id){
  if(!confirm('Remove this potential guest?')) return;
  const {error}=await sb.from('potential_guests').delete().eq('id',id);
  if(error){ showToast('Error deleting'); return; }
  showToast('Potential guest removed');
  await loadAll();
}

function exportCSV(){
  const gc=groupCounts(guests,'group_number');
  const rows=[['Name','Group','On Property','Type']];
  guests.forEach(g=>{ rows.push([g.name,g.group_number,g.on_prop?'Yes':'No',gc[g.group_number]>1?'Couple/Group':'Solo']); });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='getchius_wedding_guests.csv';
  a.click();
}

document.getElementById('modal').addEventListener('click',e=>{ if(e.target===document.getElementById('modal')) closeModal(); });

sb.auth.getSession().then(({data:{session}})=>{ if(session) showApp(); });
</script>
